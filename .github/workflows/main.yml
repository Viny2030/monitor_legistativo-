name: Monitor Legislativo - Diputados

on:
  workflow_dispatch:          # ejecución manual desde GitHub
  schedule:
    - cron: "0 6 1 * *"      # automático: 1° de cada mes a las 6am UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pandas

      - name: Correr scraper de diputados
        run: python obtener_datos.py

      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nomina_diputados.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en la nómina."
          else
            git commit -m "auto: actualización nómina $(date +'%Y-%m-%d')"
            git push
          fi
