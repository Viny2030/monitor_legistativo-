name: Monitor Diario — Diputados

on:
  schedule:
    # 06:00 ART (09:00 UTC) todos los días
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    name: Scrape → Actualizar HTMLs → Commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml

      - name: Scraper — actualizar nómina CSV
        run: python obtener_datos.py

      - name: Actualizar array DIPUTADOS en HTMLs
        run: python scripts/actualizar_diputados.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nomina_diputados.csv \
                  dashboard/indicadores_diputados.html \
                  dashboard/nomina_detalle_diputados.html \
                  dashboard/indicadores_bloques_diputados.html
          if git diff --staged --quiet; then
            echo "Sin cambios, nada que commitear"
          else
            FECHA=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: actualización automática diputados $FECHA [skip ci]"
            git push
          fi

      - name: Resumen
        if: always()
        run: |
          echo "### Monitor Diputados" >> $GITHUB_STEP_SUMMARY
          if [ -f nomina_diputados.csv ]; then
            TOTAL=$(tail -n +2 nomina_diputados.csv | wc -l)
            echo "- **Diputados en CSV**: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Fecha**: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ CSV no generado" >> $GITHUB_STEP_SUMMARY
          fi