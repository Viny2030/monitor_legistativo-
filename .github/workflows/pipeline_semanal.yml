name: Pipeline Semanal MEL-TP

on:
  schedule:
    # 09:00 AM Argentina (UTC-3) los días 5 y 28 de cada mes
    - cron: '0 12 5,28 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Correr pipeline completo
        run: |
          python scraper_pipeline.py

      - name: Guardar resultados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ *.csv *.log || true
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "auto: pipeline $(date +'%Y-%m-%d') — datos actualizados"
            git pull --rebase origin main
            git push origin main
          fi