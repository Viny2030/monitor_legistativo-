name: Actualizar datos legislativos

on:
  # Corre automaticamente cada 15 dias (dia 1 y 15 de cada mes a las 6:00 ART)
  schedule:
    - cron: "0 9 1,15 * *"   # 9:00 UTC = 6:00 ART

  # Permite correrlo manualmente desde la pestaña Actions
  workflow_dispatch:
    inputs:
      step:
        description: "Step especifico a correr (dejar vacio para pipeline completo)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - nomina
          - asistencia
          - proyectos
          - presupuesto
          - votaciones

  # Se dispara si cambia algun archivo Python del scraper
  push:
    paths:
      - "scraper_pipeline.py"
      - "requirements.txt"

jobs:
  scrape_and_deploy:
    name: Scrape → Commit JSON → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout del repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python setup
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Dependencias adicionales del pipeline si no estan en requirements.txt
          pip install requests beautifulsoup4 pandas lxml

      # 4. Crear directorio de datos
      - name: Preparar directorio data/
        run: mkdir -p data

      # 5. Correr el pipeline (completo o step especifico)
      - name: Correr scraper_pipeline.py
        run: |
          if [ -n "${{ github.event.inputs.step }}" ]; then
            echo "Corriendo step: ${{ github.event.inputs.step }}"
            python scraper_pipeline.py --step ${{ github.event.inputs.step }}
          else
            echo "Corriendo pipeline completo"
            python scraper_pipeline.py
          fi
        env:
          # Agregar aqui tokens de APIs si se necesitan en el futuro
          PYTHONUNBUFFERED: "1"

      # 6. Verificar que el JSON se genero correctamente
      - name: Verificar salida JSON
        run: |
          if [ ! -f data/diputados.json ]; then
            echo "ERROR: data/diputados.json no fue generado"
            exit 1
          fi
          python -c "
          import json
          with open('data/diputados.json') as f:
              d = json.load(f)
          n = len(d.get('diputados', []))
          print(f'OK: {n} diputados en el JSON')
          if n < 100:
              raise SystemExit(f'WARN: solo {n} diputados, esperados ~257')
          "

      # 7. Commit del JSON actualizado al repo
      - name: Commit datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/diputados.json
          # Solo commitear si hay cambios
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos, nada que commitear"
          else
            FECHA=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: actualizacion automatica $FECHA [skip ci]"
            git push
          fi

      # 8. (Opcional) Notificar a Railway via webhook para forzar redeploy
      #    Descomentear y agregar RAILWAY_WEBHOOK_URL en los secrets del repo
      # - name: Trigger Railway redeploy
      #   if: success()
      #   run: |
      #     curl -s -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}" \
      #       -H "Content-Type: application/json" \
      #       -d '{"event": "data_updated"}' \
      #       || echo "Webhook fallido (no critico)"

      # 9. Resumen del job
      - name: Resumen
        if: always()
        run: |
          echo "### Resultado del pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/diputados.json ]; then
            python -c "
          import json, sys
          with open('data/diputados.json') as f:
              d = json.load(f)
          meta = d.get('meta', {})
          n = len(d.get('diputados', []))
          print(f'- **Diputados**: {n}')
          print(f'- **Actualizado**: {meta.get(\"ultima_actualizacion\", \"—\")}')
          presup = d.get('presupuesto', {})
          if presup.get('iap'):
              print(f'- **IAP**: {presup[\"iap\"]}')
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ JSON no generado" >> $GITHUB_STEP_SUMMARY
          fi
